name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: ai-resume-checker/package-lock.json

      - name: Install dependencies
        working-directory: ai-resume-checker
        run: npm ci

      - name: Build for production
        working-directory: ai-resume-checker
        run: npx ng build --configuration production --base-href /AI-resume-Checker/

      - name: Copy index.html to 404.html (SPA routing)
        run: cp ai-resume-checker/dist/ai-resume-checker/browser/index.html ai-resume-checker/dist/ai-resume-checker/browser/404.html

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ai-resume-checker/dist/ai-resume-checker/browser

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
